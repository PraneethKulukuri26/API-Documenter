name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --legacy-peer-deps
        env:
          npm_config_audit: false
          npm_config_fund: false

      - name: Build Assets
        run: npm run build

      - name: Build and Publish Electron App
        uses: samuelmeuli/action-electron-builder@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish: always
          # On macOS, code signing is required for auto-updates.
          # For Windows, it's highly recommended.
          # Set these secrets in GitHub if you have certificates:
          # macos_certs: ${{ secrets.MACOS_CERTS }}
          # macos_certs_password: ${{ secrets.MACOS_CERTS_PASSWORD }}
